# =============================================================================
# DFile — docker-compose.yml
# =============================================================================
# Single service: the .NET backend that also serves the Next.js static frontend.
# The database is external (db42113.public.databaseasp.net) — not containerised.
#
# Usage:
#   docker compose up --build          # first run / after code changes
#   docker compose up -d               # detached (background)
#   docker compose down                # stop & remove containers
# =============================================================================

services:
  dfile:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dfile_app
    ports:
      - "8080:80"           # Access the app at http://localhost:8080
    environment:
      # ASP.NET Core runtime
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80

      # -----------------------------------------------------------------------
      # Database — external SQL Server
      # Override here so it never comes from appsettings.json at runtime.
      # Do NOT commit real credentials to source control; use a .env file or
      # Docker secrets in production (see comments below).
      # -----------------------------------------------------------------------
      - ConnectionStrings__DefaultConnection=Server=db42113.public.databaseasp.net;Database=db42113;User Id=db42113;Password=6Jp=@g7KG3+e;Encrypt=True;TrustServerCertificate=True;MultipleActiveResultSets=True;

      # JWT signing key — override in production with a strong secret
      - Jwt__Key=ThisIsASuperSecretKeyForDFileBackendApplication123!

    # Restart policy: restart the container unless explicitly stopped
    restart: unless-stopped

    # -------------------------------------------------------------------------
    # Health check: poll the /api/health endpoint every 30 s
    # -------------------------------------------------------------------------
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# =============================================================================
# To use a .env file for secrets instead of hard-coding above:
#   1. Copy the block below into a file named ".env" in this directory.
#   2. Replace the environment: block above with env_file: [.env]
#   3. Add ".env" to .gitignore so credentials are never committed.
#
# Contents of .env:
#   ASPNETCORE_ENVIRONMENT=Production
#   ASPNETCORE_URLS=http://+:80
#   ConnectionStrings__DefaultConnection=Server=...;Database=...;...
#   Jwt__Key=YourStrongSecretKeyHere
# =============================================================================
